name: ml-eval

on:
  push:
    paths:
      - "eval/**"
      - "ml/**"
      - ".github/workflows/eval.yml"
  pull_request:
    paths:
      - "eval/**"
      - "ml/**"
      - ".github/workflows/eval.yml"
  workflow_dispatch:

jobs:
  golden-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install evaluation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ml/requirements-test.txt

      - name: Run golden evaluation gate
        run: |
          python ml/eval/evaluate.py \
            --goldens-dir eval/goldens \
            --model-path public/models/lightweight_audio_model.production.onnx \
            --thresholds-path ml/checkpoints/label_thresholds.json \
            --baseline-path ml/eval/baseline.json \
            --macro-epsilon 0.02 \
            --per-label-epsilon 0.03 \
            --weak-label-f1-threshold 0.40 \
            --weak-label-epsilon 0.02 \
            --max-ratio-per-label 1.0 \
            --distribution-slack 0.20 \
            --entropy-epsilon 0.12 \
            --report-json-path ml/eval/latest_report.json

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-eval-report
          path: ml/eval/latest_report.json
