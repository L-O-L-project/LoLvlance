name: ml-eval

on:
  push:
    paths:
      - "eval/**"
      - "ml/**"
      - ".github/workflows/eval.yml"
  pull_request:
    paths:
      - "eval/**"
      - "ml/**"
      - ".github/workflows/eval.yml"
  workflow_dispatch:

jobs:
  golden-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install evaluation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ml/requirements-test.txt

      - name: Run golden evaluation gate
        run: |
          python ml/eval/evaluate.py \
            --goldens-dir eval/goldens \
            --model-path ml/checkpoints/lightweight_audio_model.onnx \
            --thresholds-path ml/checkpoints/label_thresholds.json \
            --baseline-path ml/eval/baseline.json \
            --min-f1 0.65
